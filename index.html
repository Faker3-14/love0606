<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>❤️ 专属入口 ❤️</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#ffd6e7,#fff);
font-family:Arial;
}

.box{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
width:320px;
}

input{
width:80%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
margin-top:15px;
}

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:14px;
background:pink;
font-size:16px;
cursor:pointer;
}

#main{
display:none;
}

h1{
color:#ff4f87;
}
</style>
</head>

<body>

<div class="box" id="login">

<h1>🔒 进入我们的秘密世界</h1>

<p>请输入密码</p>

<input
type="password"
id="pwd"
placeholder="输入密码">

<br>

<button onclick="check()">
进入
</button>

</div>


<div class="box" id="main">

<h1>❤️ 给我的0606女孩 ❤️</h1>

<p>
欢迎来到我们的秘密基地
</p>

<p>
以后这里可以放照片、回忆、恋爱天数
</p>

<p>
2026 ❤️ Forever
</p>

</div>


<script>

function check(){

let p=document.getElementById("pwd").value

if(p==="0606"){

document.getElementById("login").style.display="none"

document.getElementById("main").style.display="block"

}else{

alert("密码错误")
}

}

</script>

</body>
</html>
