<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ is黄黄 & Han仔 专属秘密 ❤️</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{margin:0;overflow-x:hidden}
        .login{
            min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            background:#fce7f3;padding:20px;
        }
        .box{
            background:#fff;border-radius:24px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            padding:32px;max-width:400px;width:100%;text-align:center;
        }
        h1{font-size:28px;margin-bottom:16px;color:#e11c47}
        p{margin-bottom:20px;color:#666}
        input{
            width:100%;padding:12px 16px;border:1px solid #ddd;
            border-radius:12px;font-size:16px;margin-bottom:20px
        }
        button{
            background:#f472b6;color:#fff;border:none;
            padding:12px 24px;border-radius:16px;font-size:16px;cursor:pointer
        }

        .heart-page{
            min-height:100vh;
            background:#fce7f3;
            display:flex;align-items:center;justify-content:center;
        }
        .heart{
            font-size:140px;color:#f43f5e;
            animation:beat 0.6s infinite;
        }
        @keyframes beat{
            0%,100%{transform:scale(1)}
            50%{transform:scale(1.2)}
        }

        .content{
            min-height:100vh;
            background:linear-gradient(#fbcfe8,#fff);
            padding:40px 20px;text-align:center;position:relative;
        }
        .couple-name{
            font-size:36px;margin:20px 0;color:#c8102e;
        }
        .love-day{
            font-size:22px;color:#e11c47;margin:15px 0;font-weight:bold;
        }
        .memo{
            font-size:18px;margin:12px 0;color:#555;line-height:1.8
        }
        .date-box,.period-box,.fun-box,.wish-box,.game-box,.message-box,.luck-box,.capsule-box{
            margin-top:30px;padding:24px;
            background:rgba(255,255,255,0.75);border-radius:18px;
        }
        .date-title{
            font-size:20px;color:#c8102e;margin-bottom:12px;font-weight:bold;
        }
        .btn{
            margin:8px;padding:10px 18px;background:#f43f5e;color:white;border:none;border-radius:12px;font-size:15px;
        }
        .wish-item{
            display:flex;align-items:center;margin:8px 0;text-align:left;
        }
        .wish-item input{
            width:20px;margin-right:10px;margin-bottom:0;
        }
        .wheel{
            width:200px;height:200px;border-radius:50%;border:8px solid #f43f5e;
            margin:20px auto;position:relative;overflow:hidden;
        }
        .wheel-sector{
            position:absolute;width:50%;height:50%;transform-origin:bottom right;
            display:flex;align-items:center;justify-content:center;
        }
        .wheel-text{
            transform:rotate(45deg);font-size:12px;font-weight:bold;
        }

        /* ========== 3D QQ企鹅风格小狗 ========== */
        .pet-container{
            position:fixed;z-index:999;perspective:1000px;
        }
        .pet{
            position:relative;transform-style:preserve-3d;cursor:pointer;
            transition:all 0.5s ease;
        }
        .dog-body{
            width:70px;height:50px;
            background:linear-gradient(135deg,#f9a826,#f59e0b);
            border-radius:35px 35px 30px 30px;
            position:relative;transform:rotateX(10deg);
            box-shadow:0 10px 15px rgba(0,0,0,0.2),inset 0 -5px 10px rgba(0,0,0,0.1);
        }
        .dog-head{
            width:50px;height:45px;
            background:linear-gradient(135deg,#f9a826,#f59e0b);
            border-radius:50%;position:absolute;top:-30px;left:-10px;
            transform:rotateX(15deg);
            box-shadow:0 5px 10px rgba(0,0,0,0.15),inset 0 -3px 8px rgba(0,0,0,0.08);
        }
        .dog-ear{
            width:15px;height:25px;background:#f59e0b;
            border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
            position:absolute;top:-8px;transform:rotateX(20deg);
        }
        .dog-ear.left{left:-3px;transform:rotate(-25deg) rotateX(20deg)}
        .dog-ear.right{right:-3px;transform:rotate(25deg) rotateX(20deg)}
        .dog-eye{
            width:8px;height:8px;background:#000;border-radius:50%;
            position:absolute;top:12px;box-shadow:0 0 2px rgba(255,255,255,0.8);
        }
        .dog-eye.left{left:10px}
        .dog-eye.right{right:10px}
        .dog-nose{
            width:10px;height:8px;background:linear-gradient(135deg,#333,#000);
            border-radius:50%;position:absolute;bottom:10px;left:50%;
            transform:translateX(-50%) rotateX(10deg);
        }
        .dog-tail{
            width:25px;height:10px;background:#f59e0b;border-radius:10px;
            position:absolute;right:-20px;top:18px;transform-origin:left center;
            animation:wag 1s infinite alternate;transform:rotateX(10deg);
        }
        .pet-status{
            position:absolute;top:-50px;left:50%;transform:translateX(-50%) translateZ(20px);
            background:#fff;padding:6px 12px;border-radius:15px;font-size:12px;
            white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.15);
        }
        .pet-bubble{
            position:absolute;top:-80px;left:50%;transform:translateX(-50%) translateZ(30px);
            background:#fff;padding:8px 14px;border-radius:18px;font-size:13px;
            white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,0.15);max-width:220px;
        }
        @keyframes wag{0%{transform:rotate(-20deg) rotateX(10deg)}100%{transform:rotate(20deg) rotateX(10deg)}}
        @keyframes dance{
            0%{transform:rotate(0deg) translateY(0) rotateX(10deg)}
            25%{transform:rotate(-15deg) translateY(-15px) rotateX(10deg)}
            50%{transform:rotate(0deg) translateY(0) rotateX(10deg)}
            75%{transform:rotate(15deg) translateY(-15px) rotateX(10deg)}
        }
        .pet.dancing{animation:dance 0.5s infinite;}
        .pet.happy .dog-tail{animation-duration:0.2s;}

        /* 心情打卡样式 */
        .mood-feedback{margin-top:15px;padding:15px;background:rgba(252,231,243,0.5);border-radius:12px;text-align:left;}
        .mood-input{width:100%;padding:10px;border-radius:10px;border:1px solid #f472b6;margin-top:10px;resize:none;height:60px;}
        .mood-buttons{display:flex;justify-content:space-around;margin:10px 0;}
        .mood-btn{font-size:28px;background:none;border:none;cursor:pointer;padding:10px;border-radius:10px;transition:all 0.3s;}
        .mood-btn:hover{background:#fce7f3;transform:scale(1.2);}
        .mood-btn:disabled{opacity:0.5;cursor:not-allowed;}

        /* 打字机 */
        .typewriter{overflow:hidden;white-space:nowrap;border-right:3px solid #e11c47;animation:typing 4s steps(40,end),blink-caret 0.75s step-end infinite;}
        @keyframes typing{from{width:0}to{width:100%}}
        @keyframes blink-caret{from,to{border-color:transparent}50%{border-color:#e11c47}}
    </style>
</head>
<body>
<div id="page" class="login">
    <div class="box">
        <h1>🔒 黄帝大人的专属小世界</h1>
        <p>只有姐姐能进入哦</p>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="check()">进入</button>
    </div>
</div>

<script>
const correct = "0329";
const togetherStart = new Date("2026-05-21");
const birthdaySister = new Date(new Date().getFullYear()+"-06-06");
const birthdayMe = new Date(new Date().getFullYear()+"-03-29");
const nextMeet = new Date("2026-05-21");

let lastPeriod = localStorage.getItem("lastPeriod") || "2025-05-06";
const cycle = 28;
let missCount = Number(localStorage.getItem("missCount")) || 0;
let loveDays = Number(localStorage.getItem("loveDays")) || 0;
let lastLoveDate = localStorage.getItem("lastLoveDate") || "";
let wishes = JSON.parse(localStorage.getItem("wishes")) || [{text:"一起看一场电影",done:false},{text:"一起吃一顿火锅",done:false},{text:"一起去海边散步",done:false},{text:"一起拍一组情侣照",done:false},{text:"一起去游乐园",done:false}];
let messages = JSON.parse(localStorage.getItem("messages")) || [];
let todayMood = localStorage.getItem("todayMood") || "";
let lastMoodDate = localStorage.getItem("lastMoodDate") || "";
let moodReason = localStorage.getItem("moodReason") || "";
let capsules = JSON.parse(localStorage.getItem("loveCapsules")) || [];

// 3D小狗
let petHappiness = Number(localStorage.getItem("petHappiness")) || 50;
let petLevel = Number(localStorage.getItem("petLevel")) || 1;
let petExp = Number(localStorage.getItem("petExp")) || 0;
let petX = Math.random()*70 + 15;
let petY = Math.random()*50 + 25;
let isDancing = false;
let longPressTimer = null;

const dogWords = ["姐姐好漂亮呀～","小韩哥哥最帅了！","汪汪汪！想你们啦","要抱抱要亲亲～","今天也要开心哦","姐姐不要生气嘛","小狗狗永远爱你们","快摸摸我呀～","肚子饿饿，要吃肉肉","陪我玩好不好？"];
const loveWords = ["姐姐是藏在我心底的温柔与偏爱","朝朝暮暮，岁岁年年，只想黏着姐姐","我姐姐你过来我偷偷告诉你个小秘密：我喜欢你~","遇见姐姐，是我这辈子最大的幸运","姐姐你今天好piu 亮啊！！亲亲","姐姐！姐姐！要香香~嘻嘻嘻","姐姐是天，姐姐是地，绝对不要惹姐姐生气！！！！"];
const luckList = ["💖 甜蜜模式：今天适合黏着姐姐撒娇","🥰 宠溺模式：今天要无条件宠姐姐","💞 心动模式：今天会格外想念对方","✨ 安稳模式：平平淡淡，一直相爱"];
const truthDare = ["真心话：你最喜欢我哪一点？","大冒险：亲对方一下","真心话：你第一次见我是什么感觉？","大冒险：说一句最肉麻的情话","真心话：你想我了吗？","大冒险：抱对方10秒钟","真心话：你觉得我哪里最可爱？","大冒险：给对方唱首歌"];
// 美食转盘选项
const foodOptions = ["火锅","烧烤","奶茶","炸鸡","披萨","螺蛳粉","日料","甜品"];
const loveLetter = "亲爱的姐姐：\n从遇见你的那一刻起，我的世界就变得不一样了。\n你是我的温柔，是我的偏爱，是我的唯一。\n爱你的小韩";

function getTogetherTime(){
    const now = new Date();
    let start = new Date(togetherStart),y=0,m=0,d=0;
    while(new Date(start.getFullYear()+1,start.getMonth(),start.getDate())<=now){y++;start.setFullYear(start.getFullYear()+1);}
    while(new Date(start.getFullYear(),start.getMonth()+1,start.getDate())<=now){m++;start.setMonth(start.getMonth()+1);}
    d=Math.floor((now-start)/(1000*60*60*24));
    return {years:y,months:m,days:d,totalDays:Math.max(0,Math.floor((now-togetherStart)/(1000*60*60*24)))};
}
function getPeriodTips(){
    const last=new Date(lastPeriod),now=new Date();
    const diff=Math.floor((now-last)/(1000*60*60*24));
    const nextDays=cycle-(diff%cycle);
    let s,c;
    if(nextDays<=5){s="🩸 生理期快来啦，姐姐注意保暖～";c="#e11c47";}
    else if(nextDays<=14){s="💖 易孕期，要好好照顾姐姐";c="#ff6b81";}
    else{s="✨ 安全期，安心陪伴姐姐";c="#2ed573";}
    return {nextDays,status:s,color:c};
}

// 3D小狗初始化
function init3DPet(){
    const wrap=document.createElement("div");
    wrap.className="pet-container";
    wrap.innerHTML=`<div class="pet" id="pet" style="left:${petX}%;top:${petY}%"><div class="pet-status" id="pet-status">🐶 Lv.${petLevel} 开心值：${Math.round(petHappiness)}%</div><div class="dog-body"><div class="dog-head"><div class="dog-ear left"></div><div class="dog-ear right"></div><div class="dog-eye left"></div><div class="dog-eye right"></div><div class="dog-nose"></div></div><div class="dog-tail"></div></div></div>`;
    document.body.appendChild(wrap);
    setInterval(()=>{
        if(!isDancing){petX=Math.random()*70+15;petY=Math.random()*50+25;document.getElementById("pet").style.left=petX+"%";document.getElementById("pet").style.top=petY+"%";}
        petHappiness=Math.max(0,petHappiness-0.05);updatePetStatus();
        if(petHappiness>=100&&Math.random()<0.1&&!isDancing)startDance();
    },3500);
    setInterval(()=>{if(Math.random()<0.3)showDogBubble(dogWords[Math.floor(Math.random()*dogWords.length)]);},12000);
    const pet=document.getElementById("pet");
    pet.onclick=()=>{clearTimeout(longPressTimer);petHappiness=Math.min(100,petHappiness+3);petExp+=1;checkLevelUp();pet.classList.add("happy");setTimeout(()=>pet.classList.remove("happy"),600);updatePetStatus();};
    pet.onmousedown=pet.ontouchstart=()=>{longPressTimer=setTimeout(()=>{petHappiness=Math.min(100,petHappiness+12);petExp+=6;checkLevelUp();showDogBubble("好舒服呀～谢谢姐姐/哥哥摸摸🥰");updatePetStatus();},500);};
    pet.onmouseup=pet.ontouchend=()=>{clearTimeout(longPressTimer);};
}
function startDance(){
    isDancing=true;const pet=document.getElementById("pet");pet.classList.add("dancing");showDogBubble("🎉 我超开心！给你们跳个舞～");
    setTimeout(()=>{pet.classList.remove("dancing");isDancing=false;petHappiness=75;updatePetStatus();},6000);
}
function showDogBubble(text){
    let b=document.querySelector(".pet-bubble");if(b)b.remove();
    b=document.createElement("div");b.className="pet-bubble";b.innerText=text;document.getElementById("pet").appendChild(b);
    setTimeout(()=>b.remove(),3500);
}
function checkLevelUp(){
    const need=petLevel*100;
    if(petExp>=need){petLevel++;petExp=0;localStorage.setItem("petLevel",petLevel);localStorage.setItem("petExp",petExp);showDogBubble(`🎊 升级啦！现在是 Lv.${petLevel} 小狗狗！`);}
    localStorage.setItem("petExp",petExp);
}
function updatePetStatus(){
    localStorage.setItem("petHappiness",petHappiness);
    let st;
    if(petHappiness>=90)st="🐶 超级开心！";
    else if(petHappiness>=70)st="🐶 很开心～";
    else if(petHappiness>=40)st="🐶 还不错哦";
    else if(petHappiness>=20)st="🐶 有点无聊...";
    else st="🐶 呜呜，想你们了🥺";
    const el=document.getElementById("pet-status");if(el)el.innerText=`${st} Lv.${petLevel} 开心值：${Math.round(petHappiness)}%`;
}
function typeWriter(text,id,speed=50){
    let i=0,el=document.getElementById(id);el.innerHTML="";
    function ty(){if(i<text.length){el.innerHTML+=text[i++];setTimeout(ty,speed);}}ty();
}

// 核心：登录后不再刷新重进
function check(){
    const val=document.getElementById("pwd").value;
    if(val===correct){
        localStorage.setItem("isLogin","1");
        renderMain();
    }else alert("密码不对～只有黄帝大人才能进来哦");
}
// 直接渲染主页，不刷新
function renderMain(){
    const now=new Date(),t=getTogetherTime();
    let bSis=Math.ceil((birthdaySister-now)/(1000*60*60*24));if(bSis<0)bSis+=365;
    let bMe=Math.ceil((birthdayMe-now)/(1000*60*60*24));if(bMe<0)bMe+=365;
    const meetLeft=Math.max(0,Math.ceil((nextMeet-now)/(1000*60*60*24)));
    const pInfo=getPeriodTips();
    const ranWord=loveWords[Math.floor(Math.random()*loveWords.length)];
    const todayLuck=luckList[Math.floor(Math.random()*luckList.length)];
    const today=now.toDateString();
    const canLove=today!==lastLoveDate;
    const canMood=today!==lastMoodDate;

    let moodHtml="";
    if(todayMood&&!canMood){
        if(todayMood==="😢"||todayMood==="😠"){
            moodHtml=`<div class="mood-feedback"><p style="color:#e11c47;font-weight:bold">姐姐今天为什么不高兴呀，可以告诉我吗</p><textarea class="mood-input" id="mood-reason-input" placeholder="写下你的心情...">${moodReason}</textarea><button class="btn" onclick="saveMoodReason()">保存</button></div>`;
        }else{
            moodHtml=`<div class="mood-feedback"><p style="color:#2ed573;font-weight:bold">yeah yeah 今天我们又是开开心心的</p>${moodReason?`<p style="margin-top:10px">开心的原因：${moodReason}</p>`:""}</div>`;
        }
    }

    document.getElementById("page").innerHTML=`
    <div class="content">
        <h1 class="couple-name">小韩 ❤️ 漂亮姐姐 黄雨辰</h1>
        <p class="love-day">我们已经相爱 ${t.years}年${t.months}月${t.days}天</p>
        <p class="memo">总计 ${t.totalDays} 天</p>
        <div class="memo typewriter" id="loveLetter"></div>
        <p class="memo">全世界最好的姐姐<br>我永远偏爱你、依赖你、守护你</p>
        <p class="memo">你是我的温柔，是我的偏爱，也是我的唯一</p>

        <div class="date-box">
            <p class="date-title">💌 我们的专属纪念日</p>
            <p class="memo">和姐姐正式开始：2026.05.21</p>
            <p class="memo">距离下次见面：还有 ${meetLeft} 天</p>
            <p class="memo">姐姐生日(06.06)：还有 ${bSis} 天</p>
            <p class="memo">我的生日(03.29)：还有 ${bMe} 天</p>
        </div>

        <div class="period-box">
            <p class="date-title">🩸 姐姐生理期记录</p>
            <p class="memo">距离下次生理期：${pInfo.nextDays} 天</p>
            <p class="memo" style="color:${pInfo.color};font-weight:bold">${pInfo.status}</p>
            <input class="period-input" type="date" id="period-date" value="${lastPeriod}">
            <p class="memo" style="font-size:14px;margin-top:8px">姐姐可自己更新生理期日期</p>
        </div>

        <div class="fun-box">
            <p class="date-title">✨ 情侣小乐园</p>
            <p class="memo">今日情话：${ranWord}</p>
            <p class="memo">今日运势：${todayLuck}</p>
            <p class="memo">我已经想姐姐 <span id="miss-num">${missCount}</span> 次啦</p>
            <p class="memo">连续说我爱你：${loveDays} 天</p>
            <p class="memo">今日心情：${todayMood||"还没打卡"}</p>
            <button class="btn" onclick="addMiss()">💓 又想姐姐了 +1</button>
            <button class="btn" onclick="refreshWord()">💌 换一句情话</button>
            <button class="btn" onclick="sayLove()" ${!canLove?"disabled":""}>💕 今日说我爱你</button>
            <button class="btn" onclick="feedPet()">🍖 喂小狗吃东西</button>
            <button class="btn" onclick="playWithPet()">🎾 陪小狗玩</button>
        </div>

        <div class="capsule-box">
            <p class="date-title">💌 爱情时间胶囊</p>
            <p class="memo">给未来的对方写一封信，到指定日期才能打开</p>
            <textarea class="capsule-input" id="capsule-content" placeholder="写下你想对未来的TA说的话..."></textarea>
            <input type="date" class="capsule-date" id="capsule-date" min="${new Date().toISOString().split('T')[0]}">
            <button class="btn" onclick="createCapsule()">🔒 封存时间胶囊</button>
            <div id="capsule-list"></div>
        </div>

        <div class="luck-box">
            <p class="date-title">🍽️ 今天吃什么呢</p>
            <div class="wheel" id="luckWheel">
                <div class="wheel-sector" style="transform:rotate(0deg);background:#ffb6c1"><div class="wheel-text">火锅</div></div>
                <div class="wheel-sector" style="transform:rotate(45deg);background:#ffc0cb"><div class="wheel-text">烧烤</div></div>
                <div class="wheel-sector" style="transform:rotate(90deg);background:#ffb6c1"><div class="wheel-text">奶茶</div></div>
                <div class="wheel-sector" style="transform:rotate(135deg);background:#ffc0cb"><div class="wheel-text">炸鸡</div></div>
                <div class="wheel-sector" style="transform:rotate(180deg);background:#ffb6c1"><div class="wheel-text">披萨</div></div>
                <div class="wheel-sector" style="transform:rotate(225deg);background:#ffc0cb"><div class="wheel-text">螺蛳粉</div></div>
                <div class="wheel-sector" style="transform:rotate(270deg);background:#ffb6c1"><div class="wheel-text">日料</div></div>
                <div class="wheel-sector" style="transform:rotate(315deg);background:#ffc0cb"><div class="wheel-text">甜品</div></div>
            </div>
            <button class="btn" onclick="spinLuckWheel()">🎲 帮我决定</button>
            <p id="luck-result" class="memo" style="margin-top:15px;font-weight:bold"></p>
        </div>

        <div class="wish-box"><p class="date-title">📝 我们的心愿清单</p><div id="wish-list"></div></div>
        <div class="message-box"><p class="date-title">💬 私密留言板</p><textarea class="message-input" id="message-input" placeholder="给对方留一句悄悄话..."></textarea><button class="btn" onclick="sendMessage()">发送留言</button><div id="message-list"></div></div>
        <div class="game-box">
            <p class="date-title">🎮 真心话大冒险</p>
            <div class="wheel" id="gameWheel">
                <div class="wheel-sector" style="transform:rotate(0deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                <div class="wheel-sector" style="transform:rotate(45deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                <div class="wheel-sector" style="transform:rotate(90deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                <div class="wheel-sector" style="transform:rotate(135deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                <div class="wheel-sector" style="transform:rotate(180deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                <div class="wheel-sector" style="transform:rotate(225deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                <div class="wheel-sector" style="transform:rotate(270deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                <div class="wheel-sector" style="transform:rotate(315deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
            </div>
            <button class="btn" onclick="spinGameWheel()">🎲 开始转动</button>
            <p id="game-result" class="memo" style="margin-top:15px;font-weight:bold"></p>
        </div>

        <div class="fun-box">
            <p class="date-title">😊 每日心情打卡</p>
            <div class="mood-buttons">
                <button class="mood-btn" onclick="setMood('😊')" ${!canMood?"disabled":""}>😊</button>
                <button class="mood-btn" onclick="setMood('😃')" ${!canMood?"disabled":""}>😃</button>
                <button class="mood-btn" onclick="setMood('😢')" ${!canMood?"disabled":""}>😢</button>
                <button class="mood-btn" onclick="setMood('😠')" ${!canMood?"disabled":""}>😠</button>
                <button class="mood-btn" onclick="setMood('🥰')" ${!canMood?"disabled":""}>🥰</button>
            </div>
            ${moodHtml}
            <p class="memo" style="font-size:14px">每天只能打卡一次哦</p>
        </div>
    </div>`;

    // 渲染心愿
    const wishList=document.getElementById("wish-list");wishList.innerHTML="";
    wishes.forEach((w,i)=>{wishList.innerHTML+=`<div class="wish-item"><input type="checkbox" ${w.done?"checked":""} onchange="toggleWish(${i})"><label>${w.text}</label></div>`;});
    // 留言
    const msgList=document.getElementById("message-list");msgList.innerHTML="";
    messages.forEach(m=>{msgList.innerHTML+=`<div class="message-item"><p>${m.text}</p><p class="message-time">${m.time}</p></div>`;});
    // 胶囊
    const capList=document.getElementById("capsule-list");capList.innerHTML="";
    capsules.forEach((c,i)=>{
        const open=new Date(c.openDate),dLeft=Math.ceil((open-now)/(1000*60*60*24));
        capList.innerHTML+=`<div class="capsule-item"><div class="capsule-title">${c.title||"给未来的信"}</div><div class="capsule-time">${c.createTime}｜${c.openDate}</div>${now>=open?`<button class="btn" onclick="openCapsule(${i})">打开</button><div id="cap${i}" style="display:none;margin-top:10px">${c.content}</div>`:`<p>还有${dLeft}天</p>`}</div>`;
    });
    typeWriter(loveLetter,"loveLetter",80);
    init3DPet();
}

// 全局函数（不再刷新）
window.addMiss=()=>{missCount++;localStorage.setItem("missCount",missCount);document.getElementById("miss-num").innerText=missCount;};
window.refreshWord=()=>{const w=loveWords[Math.floor(Math.random()*loveWords.length)];document.querySelector(".fun-box .memo:nth-child(2)").innerText="今日情话："+w;};
window.sayLove=()=>{const today=new Date().toDateString();if(today!==lastLoveDate){loveDays++;lastLoveDate=today;localStorage.setItem("loveDays",loveDays);localStorage.setItem("lastLoveDate",lastLoveDate);alert("❤️ 我爱你！");renderMain();}};
window.toggleWish=(i)=>{wishes[i].done=!wishes[i].done;localStorage.setItem("wishes",JSON.stringify(wishes));renderMain();};
window.spinLuckWheel=()=>{const w=document.getElementById("luckWheel");const a=Math.random()*360+1440;w.style.transition="transform 4s ease-out";w.style.transform=`rotate(${a}deg)`;setTimeout(()=>{document.getElementById("luck-result").innerText="今天就吃："+foodOptions[Math.floor(Math.random()*foodOptions.length)];},4000);};
window.spinGameWheel=()=>{const w=document.getElementById("gameWheel");const a=Math.random()*360+1440;w.style.transition="transform 4s ease-out";w.style.transform=`rotate(${a}deg)`;setTimeout(()=>{document.getElementById("game-result").innerText=truthDare[Math.floor(Math.random()*truthDare.length)];},4000);};
window.feedPet=()=>{petHappiness=Math.min(100,petHappiness+25);petExp+=10;checkLevelUp();showDogBubble("🍖 谢谢姐姐～");updatePetStatus();};
window.playWithPet=()=>{petHappiness=Math.min(100,petHappiness+15);petExp+=8;checkLevelUp();showDogBubble("🎾 好开心！");updatePetStatus();};
window.sendMessage=()=>{const t=document.getElementById("message-input").value.trim();if(!t)return;const now=new Date();messages.unshift({text:t,time:now.toLocaleString()});localStorage.setItem("messages",JSON.stringify(messages));renderMain();};
window.setMood=(m)=>{const today=new Date().toDateString();if(today!==lastMoodDate){todayMood=m;lastMoodDate=today;moodReason="";localStorage.setItem("todayMood",todayMood);localStorage.setItem("lastMoodDate",lastMoodDate);localStorage.setItem("moodReason","");renderMain();}};
window.saveMoodReason=()=>{moodReason=document.getElementById("mood-reason-input").value.trim();localStorage.setItem("moodReason",moodReason);alert("已保存～");renderMain();};
window.createCapsule=()=>{const c=document.getElementById("capsule-content").value.trim();const d=document.getElementById("capsule-date").value;if(!c||!d){alert("填写内容和日期");return;}capsules.unshift({content:c,openDate:d,createTime:new Date().toLocaleString(),title:`写给${d}的信`});localStorage.setItem("loveCapsules",JSON.stringify(capsules));renderMain();};
window.openCapsule=(i)=>{const el=document.getElementById("cap"+i);el.style.display=el.style.display==="none"?"block":"none";};

// 打开自动登录
window.onload=()=>{if(localStorage.getItem("isLogin")==="1")renderMain();};
</script>
</body>
</html>
