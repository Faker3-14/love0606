<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ is黄黄 & Han仔 专属秘密 ❤️</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{margin:0;overflow-x:hidden}
        .login{
            min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            background:#fce7f3;padding:20px;
        }
        .box{
            background:#fff;border-radius:24px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            padding:32px;max-width:400px;width:100%;text-align:center;
        }
        h1{font-size:28px;margin-bottom:16px;color:#e11c47}
        p{margin-bottom:20px;color:#666}
        input{
            width:100%;padding:12px 16px;border:1px solid #ddd;
            border-radius:12px;font-size:16px;margin-bottom:20px
        }
        button{
            background:#f472b6;color:#fff;border:none;
            padding:12px 24px;border-radius:16px;font-size:16px;cursor:pointer
        }

        .heart-page{
            min-height:100vh;
            background:#fce7f3;
            display:flex;align-items:center;justify-content:center;
        }
        .heart{
            font-size:140px;color:#f43f5e;
            animation:beat 0.6s infinite;
        }
        @keyframes beat{
            0%,100%{transform:scale(1)}
            50%{transform:scale(1.2)}
        }

        .content{
            min-height:100vh;
            background:linear-gradient(#fbcfe8,#fff);
            padding:40px 20px;text-align:center;
        }
        .couple-name{
            font-size:36px;margin:20px 0;color:#c8102e;
        }
        .love-day{
            font-size:22px;color:#e11c47;margin:15px 0;font-weight:bold;
        }
        .memo{
            font-size:18px;margin:12px 0;color:#555;line-height:1.8
        }
        .date-box,.period-box,.fun-box{
            margin-top:30px;padding:24px;
            background:rgba(255,255,255,0.75);border-radius:18px;
        }
        .date-title{
            font-size:20px;color:#c8102e;margin-bottom:12px;font-weight:bold;
        }
        .btn{
            margin:8px;padding:10px 18px;background:#f43f5e;color:white;border:none;border-radius:12px;font-size:15px;
        }
    </style>
</head>
<body>

<div id="page" class="login">
    <div class="box">
        <h1>🔒 黄帝姐姐的专属小世界</h1>
        <p>只有姐姐能进入哦</p>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="check()">进入</button>
    </div>
</div>

<script>
const correct = "0329";
const togetherStart = new Date("2026-05-21");
const birthdaySister = new Date(new Date().getFullYear()+"-06-06");
const birthdayMe = new Date(new Date().getFullYear()+"-03-29");

let lastPeriod = localStorage.getItem("lastPeriod") || "2025-05-06";
const cycle = 28;
let missCount = Number(localStorage.getItem("missCount")) || 0;

// 随机情话库
const loveWords = [
    "姐姐是藏在我心底的温柔与偏爱",
    "朝朝暮暮，岁岁年年，只想黏着姐姐",
    "我姐姐你过来我偷偷告诉你个小秘密：我喜欢你~",
    "遇见姐姐，是我这辈子最大的幸运",
    "姐姐你今天好piu 亮啊！！亲亲",
    "姐姐！姐姐！要香香~嘻嘻嘻",
    "姐姐十天，姐姐是地，绝对不要惹姐姐生气！！！！"
];

// 今日情侣运势
const luckList = [
    "💖 甜蜜模式：今天适合黏着姐姐撒娇",
    "🥰 宠溺模式：今天要无条件宠姐姐",
    "💞 心动模式：今天会格外想念对方",
    "✨ 安稳模式：平平淡淡，一直相爱"
];

// 在一起时间
function getTogetherTime(){
    const now = new Date();
    let start = new Date(togetherStart);
    let years = 0, months = 0, days = 0;
    while (new Date(start.getFullYear()+1, start.getMonth(), start.getDate()) <= now) {
        years++; start.setFullYear(start.getFullYear()+1);
    }
    while (new Date(start.getFullYear(), start.getMonth()+1, start.getDate()) <= now) {
        months++; start.setMonth(start.getMonth()+1);
    }
    days = Math.floor((now - start) / (1000*60*60*24));
    const totalDays = Math.max(0, Math.floor((now - togetherStart) / (1000*60*60*24)));
    return {years,months,days,totalDays};
}

// 生理期
function getPeriodTips(){
    const last = new Date(lastPeriod);
    const now = new Date();
    const diff = Math.floor((now - last)/(1000*60*60*24));
    const nextDays = cycle - (diff % cycle);
    let status,color;
    if(nextDays <= 5){
        status="🩸 生理期快来啦，姐姐注意保暖～";color="#e11c47";
    }else if(nextDays <= 14){
        status="💖 易孕期，要好好照顾姐姐";color="#ff6b81";
    }else{
        status="✨ 安全期，安心陪伴姐姐";color="#2ed573";
    }
    return {nextDays,status,color};
}

function check(){
    let val = document.getElementById('pwd').value;
    if(val === correct){
        document.getElementById('page').innerHTML = `<div class="heart-page"><div class="heart">❤️</div></div>`;
        
        setTimeout(()=>{
            const now = new Date();
            const t = getTogetherTime();
            let birthSisterLeft = Math.ceil((birthdaySister - now) / (1000*60*60*24));
            if(birthSisterLeft < 0) birthSisterLeft += 365;
            let birthMeLeft = Math.ceil((birthdayMe - now) / (1000*60*60*24));
            if(birthMeLeft < 0) birthMeLeft += 365;
            const periodInfo = getPeriodTips();
            const randomWord = loveWords[Math.floor(Math.random()*loveWords.length)];
            const todayLuck = luckList[Math.floor(Math.random()*luckList.length)];

            document.getElementById('page').innerHTML = `
            <div class="content">
                <h1 class="couple-name">小韩 ❤️ 漂亮姐姐 黄雨辰</h1>
                <p class="love-day">我们已经相爱 ${t.years}年${t.months}月${t.days}天</p>
                <p class="memo">总计 ${t.totalDays} 天</p>
                <p class="memo">${randomWord}</p>
                <p class="memo">全世界最好的姐姐<br>我永远偏爱你、依赖你、守护你</p>
                <p class="memo">你是我的温柔，是我的偏爱，也是我的唯一</p>
                <p class="memo">往后我想一直叫你姐姐</p>

                <div class="date-box">
                    <p class="date-title">💌 我们的专属纪念日</p>
                    <p class="memo">和姐姐正式开始：2026.05.21</p>
                    <p class="memo">姐姐生日(06.06)：还有 ${birthSisterLeft} 天</p>
                    <p class="memo">我的生日(03.29)：还有 ${birthMeLeft} 天</p>
                </div>

                <div class="period-box">
                    <p class="date-title">🩸 姐姐生理期记录</p>
                    <p class="memo">距离下次生理期：${periodInfo.nextDays} 天</p>
                    <p class="memo" style="color:${periodInfo.color};font-weight:bold">${periodInfo.status}</p>
                    <input class="period-input" type="date" id="period-date" value="${lastPeriod}">
                    <p class="memo" style="font-size:14px;margin-top:8px">姐姐可自己更新生理期日期</p>
                </div>

                <div class="fun-box">
                    <p class="date-title">✨ 情侣小乐园</p>
                    <p class="memo">今日运势：${todayLuck}</p>
                    <p class="memo">我已经想姐姐 <span id="miss-num">${missCount}</span> 次啦</p>
                    <button class="btn" onclick="addMiss()">💓 又想姐姐了 +1</button>
                    <button class="btn" onclick="refreshWord()">💌 换一句情话</button>
                </div>
            </div>`;

            // 想念次数+1
            window.addMiss = function(){
                missCount++;
                localStorage.setItem("missCount",missCount);
                document.getElementById("miss-num").innerText = missCount;
            }
            // 刷新情话
            window.refreshWord = function(){
                location.reload();
            }

            // 更新生理期
            document.getElementById("period-date").onchange = (e)=>{
                lastPeriod = e.target.value;
                localStorage.setItem("lastPeriod",lastPeriod);
                alert("✅ 生理期已更新");
                location.reload();
            }
        },3000);
    }else{
        alert("密码不对～只有黄帝大人才能进来哦");
    }
}
</script>
</body>
</html>
