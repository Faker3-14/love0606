        /* ========== 超级电子小狗 ========== */
        .pet{
            position:fixed;z-index:999;cursor:pointer;
            transition:all 0.5s ease;
            user-select:none;
        }
        .dog-body{
            width:60px;height:40px;background:#f9a826;border-radius:30px;
            position:relative;
        }
        .dog-head{
            width:40px;height:35px;background:#f9a826;border-radius:50%;
            position:absolute;top:-20px;left:-15px;
        }
        .dog-ear{
            width:12px;height:20px;background:#f59e0b;border-radius:50%;
            position:absolute;top:-5px;
        }
        .dog-ear.left{left:-5px;transform:rotate(-20deg)}
        .dog-ear.right{right:-5px;transform:rotate(20deg)}
        .dog-eye{
            width:6px;height:6px;background:#000;border-radius:50%;
            position:absolute;top:10px;
        }
        .dog-eye.left{left:8px}
        .dog-eye.right{right:8px}
        .dog-nose{
            width:8px;height:6px;background:#000;border-radius:50%;
            position:absolute;bottom:8px;left:50%;transform: translate(-50%);
        }
        .dog-tail{
            width:20px;height:8px;background:#f59e0b;border-radius:10px;
            position:absolute;right:-15px;top:15px;
            transform-origin:left center;
            animation:wag 1s infinite alternate;
        }
        .pet-status{
            position:absolute;top:-40px;left:50%;transform: translate(-50%);
            background:#fff;padding:6px 10px;border-radius:12px;font-size:12px;
            white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);
            animation:bubble 0.3s ease;
        }
        .pet-bubble{
            position:absolute;top:-70px;left:50%;transform: translate(-50%);
            background:#fff;padding:8px 12px;border-radius:16px;font-size:13px;
            white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);
            animation:bubble 0.5s ease;
            max-width:200px;
        }
        @keyframes wag{
            0%{transform:rotate(-20deg)}
            100%{transform:rotate(20deg)}
        }
        @keyframes bubble{
            0%{transform:translate(-50%) scale(0);opacity:0}
            100%{transform:translate(-50%) scale(1);opacity:1}
        }
        @keyframes dance{
            0%{transform:rotate(0deg) translateY(0)}
            25%{transform:rotate(-15deg) translateY(-10px)}
            50%{transform:rotate(0deg) translateY(0)}
            75%{transform:rotate(15deg) translateY(-10px)}
            100%{transform:rotate(0deg) translateY(0)}
        }
        .pet.dancing{
            animation:dance 0.5s infinite;
        }
        .pet.happy .dog-tail{
            animation-duration:0.2s;
        }

function getTogetherTime(){
    const now = new Date();
    let start = new Date(togetherStart);
    let years = 0, months = 0, days = 0;
    while (new Date(start.getFullYear()+1, start.getMonth(), start.getDate()) <= now) {
        years++; start.setFullYear(start.getFullYear()+1);
    }
    while (new Date(start.getFullYear(), start.getMonth()+1, start.getDate()) <= now) {
        months++; start.setMonth(start.getMonth()+1);
    }
    days = Math.floor((now - start) / (1000*60*60*24)) + 1;
    const totalDays = Math.max(0, Math.floor((now - togetherStart) / (1000*60*60*24)) + 1);
    return {years,months,days,totalDays};
}
function getPeriodTips(){
    const last = new Date(lastPeriod);
    const now = new Date();
    const diff = Math.floor((now - last)/(1000*60*60*24));
    const nextDays = cycle - (diff % cycle);
    let status,color;
    if(nextDays <= 5){status="🩸 生理期快来啦，姐姐注意保暖～";color="#e11c47";}
    else if(nextDays <= 14){status="💖 易孕期，要好好照顾姐姐";color="#ff6b81";}
    else{status="✨ 安全期，安心陪伴姐姐";color="#2ed573";}
    return {nextDays,status,color};
}

function showDogBubble(text){
    const oldBubble = document.querySelector(".pet-bubble");

    const bubble = document.createElement("div");

function checkLevelUp(){
    const expNeeded = petLevel * 100;
    if(petExp >= expNeeded){
        petLevel++;petExp = 0;
        localStorage.setItem("petLevel", petLevel);localStorage.setItem("petExp", petExp);
        showDogBubble(`🎊 升级啦！现在是 Lv.${petLevel} 小狗狗！`);

}
function updatePetStatus(){
    localStorage.setItem("petHappiness", petHappiness);
    let status;
    if(petHappiness >= 90) status = "🐶 超级开心！";
    else if(petHappiness >= 70) status = "🐶 很开心～";
    else if(petHappiness >= 40) status = "🐶 还不错哦";
    else if(petHappiness >= 20) status = "🐶 有点无聊...";
    else status = "🐶 呜呜，想你们了🥺";
    document.getElementById("pet-status").innerText = `${status} Lv.${petLevel} 开心值：${Math.round(petHappiness)}%`;

function typeWriter(text, elementId, speed=50){
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = "";
    function type(){if(i < text.length){element.innerHTML += text.charAt(i);i++;setTimeout(type, speed);}}
    type();
}

function initLoveMap(){
    const myChart = echarts.init(document.getElementById("loveMap"));
    // 地图标记点
    const pointData = loveCities.map(c=>{
        return {name:c.name,value:[c.lng,c.lat]};
    });
    // 轨迹连线数据（按顺序连线）
    const lineData = [];
    for(let i=0;i<loveCities.length-1;i++){
        lineData.push([
            [loveCities[i].lng, loveCities[i].lat],
            [loveCities[i+1].lng, loveCities[i+1].lat]
        ]);
    }
    const option = {
        tooltip:{trigger:"item"},
        geo:{
            map:"china",roam:false,zoom:1.2,
            itemStyle:{areaColor:"#fce7f3",borderColor:"#f43f5e"},
            emphasis:{itemStyle:{areaColor:"#fbcfe8"}}
        },
        series:[
            {type:"lines",data:lineData,lineStyle:{color:"#f43f5e",width:2,curveness:0.2}},
            {type:"scatter",coordinateSystem:"geo",symbolSize:12,data:pointData,
                itemStyle:{color:"#f43f5e"},label:{show:true,formatter:"{b}"}
            }
        ]
    };
    myChart.setOption(option);
}
