<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ is黄黄 & Han仔 专属秘密 ❤️</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{margin:0;overflow-x:hidden}
        .login{
            min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            background:#fce7f3;padding:20px;
        }
        .box{
            background:#fff;border-radius:24px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            padding:32px;max-width:400px;width:100%;text-align:center;
        }
        h1{font-size:28px;margin-bottom:16px;color:#e11c47}
        p{margin-bottom:20px;color:#666}
        input{
            width:100%;padding:12px 16px;border:1px solid #ddd;
            border-radius:12px;font-size:16px;margin-bottom:20px
        }
        button{
            background:#f472b6;color:#fff;border:none;
            padding:12px 24px;border-radius:16px;font-size:16px;cursor:pointer
        }

        .heart-page{
            min-height:100vh;
            background:#fce7f3;
            display:flex;align-items:center;justify-content:center;
        }
        .heart{
            font-size:140px;color:#f43f5e;
            animation:beat 0.6s infinite;
        }
        @keyframes beat{
            0%,100%{transform:scale(1)}
            50%{transform:scale(1.2)}
        }

        .content{
            min-height:100vh;
            background:linear-gradient(#fbcfe8,#fff);
            padding:40px 20px;text-align:center;position:relative;
        }
        .couple-name{
            font-size:36px;margin:20px 0;color:#c8102e;
        }
        .love-day{
            font-size:22px;color:#e11c47;margin:15px 0;font-weight:bold;
        }
        .memo{
            font-size:18px;margin:12px 0;color:#555;line-height:1.8
        }
        .date-box,.period-box,.fun-box,.wish-box,.game-box,.message-box,.luck-box,.capsule-box{
            margin-top:30px;padding:24px;
            background:rgba(255,255,255,0.75);border-radius:18px;
        }
        .date-title{
            font-size:20px;color:#c8102e;margin-bottom:12px;font-weight:bold;
        }
        .btn{
            margin:8px;padding:10px 18px;background:#f43f5e;color:white;border:none;border-radius:12px;font-size:15px;
        }
        .wish-item{
            display:flex;align-items:center;margin:8px 0;text-align:left;
        }
        .wish-item input{
            width:20px;margin-right:10px;margin-bottom:0;
        }
        .wheel{
            width:200px;height:200px;border-radius:50%;border:8px solid #f43f5e;
            margin:20px auto;position:relative;overflow:hidden;
        }
        .wheel-sector{
            position:absolute;width:50%;height:50%;transform-origin:bottom right;
            display:flex;align-items:center;justify-content:center;
        }
        .wheel-text{
            transform:rotate(45deg);font-size:12px;font-weight:bold;
        }

        /* ========== 超级电子小狗 ========== */
        .pet{
            position:fixed;z-index:999;cursor:pointer;
            transition:all 0.5s ease;
            user-select:none;
        }
        .dog-body{
            width:60px;height:40px;background:#f9a826;border-radius:30px;
            position:relative;
        }
        .dog-head{
            width:40px;height:35px;background:#f9a826;border-radius:50%;
            position:absolute;top:-20px;left:-15px;
        }
        .dog-ear{
            width:12px;height:20px;background:#f59e0b;border-radius:50%;
            position:absolute;top:-5px;
        }
        .dog-ear.left{left:-5px;transform:rotate(-20deg)}
        .dog-ear.right{right:-5px;transform:rotate(20deg)}
        .dog-eye{
            width:6px;height:6px;background:#000;border-radius:50%;
            position:absolute;top:10px;
        }
        .dog-eye.left{left:8px}
        .dog-eye.right{right:8px}
        .dog-nose{
            width:8px;height:6px;background:#000;border-radius:50%;
            position:absolute;bottom:8px;left:50%;transform: translate(-50%);
        }
        .dog-tail{
            width:20px;height:8px;background:#f59e0b;border-radius:10px;
            position:absolute;right:-15px;top:15px;
            transform-origin:left center;
            animation:wag 1s infinite alternate;
        }
        .pet-status{
            position:absolute;top:-40px;left:50%;transform:translate(-50%);
            background:#fff;padding:6px 10px;border-radius:12px;font-size:12px;
            white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);
            animation:bubble 0.3s ease;
        }
        .pet-bubble{
            position:absolute;top:-70px;left:50%;transform: translate(-50%);
            background:#fff;padding:8px 12px;border-radius:16px;font-size:13px;
            white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);
            animation:bubble 0.5s ease;
            max-width:200px;
        }
        @keyframes wag{
            0%{transform:rotate(-20deg)}
            100%{transform:rotate(20deg)}
        }
        @keyframes bubble{
            0%{transform:translate(-50%) scale(0);opacity:0}
            100%{transform:translate(-50%) scale(1);opacity:1}
        }
        @keyframes dance{
            0%{transform:rotate(0deg) translateY(0)}
            25%{transform:rotate(-15deg) translateY(-10px)}
            50%{transform:rotate(0deg) translateY(0)}
            75%{transform:rotate(15deg) translateY(-10px)}
            100%{transform:rotate(0deg) translateY(0)}
        }
        .pet.dancing{
            animation:dance 0.5s infinite;
        }
        .pet.happy .dog-tail{
            animation-duration:0.2s;
        }

        /* ========== 爱情时间胶囊 ========== */
        .capsule-input{
            width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;
            margin-bottom:10px;resize:none;height:100px;
        }
        .capsule-date{
            width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;
            margin-bottom:10px;
        }
        .capsule-item{
            background:#fce7f3;padding:15px;border-radius:12px;margin:10px 0;text-align:left;
        }
        .capsule-title{
            font-weight:bold;margin-bottom:5px;
        }
        .capsule-time{
            font-size:12px;color:#999;margin-bottom:8px;
        }
        .capsule-content{
            white-space:pre-wrap;line-height:1.6;
        }
    </style>
</head>
<body>

<div id="page" class="login">
    <div class="box">
        <h1>🔒 黄帝大人的专属小世界</h1>
        <p>只有姐姐能进入哦</p>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="check()">进入</button>
    </div>
</div>

<script>
const correct = "0329";
const togetherStart = new Date("2026-05-21");
const birthdaySister = new Date(new Date().getFullYear()+"-06-06");
const birthdayMe = new Date(new Date().getFullYear()+"-03-29");
const nextMeet = new Date("2026-05-21");

let lastPeriod = localStorage.getItem("lastPeriod") || "2025-05-06";
const cycle = 28;
let missCount = Number(localStorage.getItem("missCount")) || 0;
let loveDays = Number(localStorage.getItem("loveDays")) || 0;
let lastLoveDate = localStorage.getItem("lastLoveDate") || "";
let wishes = JSON.parse(localStorage.getItem("wishes")) || [
    {text:"一起看一场电影",done:false},
    {text:"一起吃一顿火锅",done:false},
    {text:"一起去海边散步",done:false},
    {text:"一起拍一组情侣照",done:false},
    {text:"一起去游乐园",done:false}
];
let messages = JSON.parse(localStorage.getItem("messages")) || [];
let todayMood = localStorage.getItem("todayMood") || "";
let lastMoodDate = localStorage.getItem("lastMoodDate") || "";
let capsules = JSON.parse(localStorage.getItem("loveCapsules")) || [];

let petHappiness = Number(localStorage.getItem("petHappiness")) || 50;
let petLevel = Number(localStorage.getItem("petLevel")) || 1;
let petExp = Number(localStorage.getItem("petExp")) || 0;
let petX = Math.random()*80 + 10;
let petY = Math.random()*60 + 20;
let isDancing = false;
let longPressTimer = null;

const dogWords = [
    "姐姐好漂亮呀～","小韩哥哥最帅了！","汪汪汪！想你们啦","要抱抱要亲亲～",
    "今天也要开心哦","姐姐不要生气嘛","小狗狗永远爱你们","快摸摸我呀～",
    "肚子饿饿，要吃肉肉","陪我玩好不好？"
];
const loveWords = [
    "姐姐是藏在我心底的温柔与偏爱","朝朝暮暮，岁岁年年，只想黏着姐姐",
    "我姐姐你过来我偷偷告诉你个小秘密：我喜欢你~","遇见姐姐，是我这辈子最大的幸运",
    "姐姐你今天好piu 亮啊！！亲亲","姐姐！姐姐！要香香~嘻嘻嘻",
    "姐姐是天，姐姐是地，绝对不要惹姐姐生气！！！！"
];
const luckList = ["💖 甜蜜模式：今天适合黏着姐姐撒娇","🥰 宠溺模式：今天要无条件宠姐姐","💞 心动模式：今天会格外想念对方","✨ 安稳模式：平平淡淡，一直相爱"];
const truthDare = ["真心话：你最喜欢我哪一点？","大冒险：亲对方一下","真心话：你第一次见我是什么感觉？","大冒险：说一句最肉麻的情话","真心话：你想我了吗？","大冒险：抱对方10秒钟","真心话：你觉得我哪里最可爱？","大冒险：给对方唱首歌"];
// 美食选项
const luckOptions = ["火锅","烧烤","奶茶","炸鸡","披萨","螺蛳粉","日料","甜品"];
const loveLetter = "亲爱的姐姐：\n从遇见你的那一刻起，我的世界就变得不一样了。\n你是我的温柔，是我的偏爱，是我的唯一。\n爱你的小韩";

function getTogetherTime(){
    const now = new Date();
    let start = new Date(togetherStart);
    let years = 0, months = 0, days = 0;
    while (new Date(start.getFullYear()+1, start.getMonth(), start.getDate()) <= now) {
        years++; start.setFullYear(start.getFullYear()+1);
    }
    while (new Date(start.getFullYear(), start.getMonth()+1, start.getDate()) <= now) {
        months++; start.setMonth(start.getMonth()+1);
    }
    days = Math.floor((now - start) / (1000*60*60*24));
    const totalDays = Math.max(0, Math.floor((now - togetherStart) / (1000*60*60*24)));
    return {years,months,days,totalDays};
}
function getPeriodTips(){
    const last = new Date(lastPeriod);
    const now = new Date();
    const diff = Math.floor((now - last)/(1000*60*60*24));
    const nextDays = cycle - (diff % cycle);
    let status,color;
    if(nextDays <= 5){status="🩸 生理期快来啦，姐姐注意保暖～";color="#e11c47";}
    else if(nextDays <= 14){status="💖 易孕期，要好好照顾姐姐";color="#ff6b81";}
    else{status="✨ 安全期，安心陪伴姐姐";color="#2ed573";}
    return {nextDays,status,color};
}

function initSuperPet(){
    const pet = document.createElement("div");
    pet.className = "pet";
    pet.id = "pet";
    pet.style.left = petX + "%";
    pet.style.top = petY + "%";
    pet.innerHTML = `
        <div class="pet-status" id="pet-status">🐶 Lv.${petLevel} 开心值：${Math.round(petHappiness)}%</div>
        <div class="dog-body">
            <div class="dog-head">
                <div class="dog-ear left"></div>
                <div class="dog-ear right"></div>
                <div class="dog-eye left"></div>
                <div class="dog-eye right"></div>
                <div class="dog-nose"></div>
            </div>
            <div class="dog-tail"></div>
        </div>`;
    document.body.appendChild(pet);
    setInterval(()=>{
        if(!isDancing){
            petX = Math.random()*80 + 10;
            petY = Math.random()*60 + 20;
            document.getElementById("pet").style.left = petX + "%";
            document.getElementById("pet").style.top = petY + "%";
        }
        petHappiness = Math.max(0, petHappiness - 0.05);
        updatePetStatus();
        if(petHappiness >= 100 && Math.random() < 0.1 && !isDancing){startDance();}
    }, 3000);
    setInterval(()=>{if(Math.random() < 0.3){showDogBubble(dogWords[Math.floor(Math.random()*dogWords.length)]);}}, 10000);
    pet.onclick = function(){
        clearTimeout(longPressTimer);
        petHappiness = Math.min(100, petHappiness + 3);
        petExp += 1;
        checkLevelUp();
        this.classList.add("happy");
        setTimeout(()=>this.classList.remove("happy"), 500);
        updatePetStatus();
    }
    pet.onmousedown = pet.ontouchstart = function(){
        longPressTimer = setTimeout(()=>{
            petHappiness = Math.min(100, petHappiness + 10);
            petExp += 5;
            checkLevelUp();
            showDogBubble("好舒服呀～谢谢姐姐/哥哥摸摸🥰");
            updatePetStatus();
        }, 500);
    }
    pet.onmouseup = pet.ontouchend = function(){clearTimeout(longPressTimer);}
}
function startDance(){
    isDancing = true;
    const pet = document.getElementById("pet");
    pet.classList.add("dancing");
    showDogBubble("🎉 我超开心！给你们跳个舞～");
    setTimeout(()=>{pet.classList.remove("dancing");isDancing = false;petHappiness = 80;updatePetStatus();}, 5000);
}
function showDogBubble(text){
    const oldBubble = document.querySelector(".pet-bubble");
    if(oldBubble) oldBubble.remove();
    const bubble = document.createElement("div");
    bubble.className = "pet-bubble";
    bubble.innerText = text;
    document.getElementById("pet").appendChild(bubble);
    setTimeout(()=>bubble.remove(), 3000);
}
function checkLevelUp(){
    const expNeeded = petLevel * 100;
    if(petExp >= expNeeded){
        petLevel++;petExp = 0;
        localStorage.setItem("petLevel", petLevel);localStorage.setItem("petExp", petExp);
        showDogBubble(`🎊 升级啦！现在是 Lv.${petLevel} 小狗狗！`);
    }
    localStorage.setItem("petExp", petExp);
}
function updatePetStatus(){
    localStorage.setItem("petHappiness", petHappiness);
    let status;
    if(petHappiness >= 90) status = "🐶 超级开心！";
    else if(petHappiness >= 70) status = "🐶 很开心～";
    else if(petHappiness >= 40) status = "🐶 还不错哦";
    else if(petHappiness >= 20) status = "🐶 有点无聊...";
    else status = "🐶 呜呜，想你们了🥺";
    document.getElementById("pet-status").innerText = `${status} Lv.${petLevel} 开心值：${Math.round(petHappiness)}%`;
}
function typeWriter(text, elementId, speed=50){
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = "";
    function type(){if(i < text.length){element.innerHTML += text.charAt(i);i++;setTimeout(type, speed);}}
    type();
}

function check(){
    let val = document.getElementById('pwd').value;
    if(val === correct){
        document.getElementById('page').innerHTML = `<div class="heart-page"><div class="heart">❤️</div></div>`;
        setTimeout(()=>{
            const now = new Date();
            const t = getTogetherTime();
            let birthSisterLeft = Math.ceil((birthdaySister - now) / (1000*60*60*24));
            if(birthSisterLeft < 0) birthSisterLeft += 365;
            let birthMeLeft = Math.ceil((birthdayMe - now) / (1000*60*60*24));
            if(birthMeLeft < 0) birthMeLeft += 365;
            const meetLeft = Math.max(0, Math.ceil((nextMeet - now) / (1000*60*60*24)));
            const periodInfo = getPeriodTips();
            const randomWord = loveWords[Math.floor(Math.random()*loveWords.length)];
            const todayLuck = luckList[Math.floor(Math.random()*luckList.length)];
            const today = now.toDateString();
            const canLove = today !== lastLoveDate;
            const canMood = today !== lastMoodDate;

            document.getElementById('page').innerHTML = `
            <div class="content">
                <h1 class="couple-name">小韩 ❤️ 漂亮姐姐 黄雨辰</h1>
                <p class="love-day">我们已经相爱 ${t.years}年${t.months}月${t.days}天</p>
                <p class="memo">总计 ${t.totalDays} 天</p>
                <div class="memo typewriter" id="loveLetter"></div>

                <div class="date-box">
                    <p class="date-title">💌 我们的专属纪念日</p>
                    <p class="memo">和姐姐正式开始：2026.05.21</p>
                    <p class="memo">距离下次见面：还有 ${meetLeft} 天</p>
                    <p class="memo">姐姐生日(06.06)：还有 ${birthSisterLeft} 天</p>
                    <p class="memo">我的生日(03.29)：还有 ${birthMeLeft} 天</p>
                </div>

                <div class="period-box">
                    <p class="date-title">🩸 姐姐生理期记录</p>
                    <p class="memo">距离下次生理期：${periodInfo.nextDays} 天</p>
                    <p class="memo" style="color:${periodInfo.color};font-weight:bold">${periodInfo.status}</p>
                    <input class="period-input" type="date" id="period-date" value="${lastPeriod}">
                    <p class="memo" style="font-size:14px;margin-top:8px">姐姐可自己更新生理期日期</p>
                </div>

                <div class="fun-box">
                    <p class="date-title">✨ 情侣小乐园</p>
                    <p class="memo">今日情话：${randomWord}</p>
                    <p class="memo">今日运势：${todayLuck}</p>
                    <p class="memo">我已经想姐姐 <span id="miss-num">${missCount}</span> 次啦</p>
                    <p class="memo">连续说我爱你：${loveDays} 天</p>
                    <p class="memo">今日心情：${todayMood || "还没打卡"}</p>
                    <button class="btn" onclick="addMiss()">💓 又想姐姐了 +1</button>
                    <button class="btn" onclick="refreshWord()">💌 换一句情话</button>
                    <button class="btn" onclick="sayLove()" ${!canLove?"disabled":""}>💕 今日说我爱你</button>
                    <button class="btn" onclick="feedPet()">🍖 喂小狗吃东西</button>
                    <button class="btn" onclick="playWithPet()">🎾 陪小狗玩</button>
                </div>

                <div class="capsule-box">
                    <p class="date-title">💌 爱情时间胶囊</p>
                    <p class="memo">给未来的对方写一封信，到指定日期才能打开</p>
                    <textarea class="capsule-input" id="capsule-content" placeholder="写下你想对未来的TA说的话..."></textarea>
                    <input type="date" class="capsule-date" id="capsule-date" min="${new Date().toISOString().split('T')[0]}">
                    <button class="btn" onclick="createCapsule()">🔒 封存时间胶囊</button>
                    <div id="capsule-list"></div>
                </div>

                <div class="luck-box">
                    <p class="date-title">🎡 爱情幸运转盘</p>
                    <div class="wheel" id="luckWheel">
                        <div class="wheel-sector" style="transform:rotate(0deg);background:#ffb6c1"><div class="wheel-text">火锅</div></div>
                        <div class="wheel-sector" style="transform:rotate(45deg);background:#ffc0cb"><div class="wheel-text">烧烤</div></div>
                        <div class="wheel-sector" style="transform:rotate(90deg);background:#ffb6c1"><div class="wheel-text">奶茶</div></div>
                        <div class="wheel-sector" style="transform:rotate(135deg);background:#ffc0cb"><div class="wheel-text">炸鸡</div></div>
                        <div class="wheel-sector" style="transform:rotate(180deg);background:#ffb6c1"><div class="wheel-text">披萨</div></div>
                        <div class="wheel-sector" style="transform:rotate(225deg);background:#ffc0cb"><div class="wheel-text">螺蛳粉</div></div>
                        <div class="wheel-sector" style="transform:rotate(270deg);background:#ffb6c1"><div class="wheel-text">日料</div></div>
                        <div class="wheel-sector" style="transform:rotate(315deg);background:#ffc0cb"><div class="wheel-text">甜品</div></div>
                    </div>
                    <button class="btn" onclick="spinLuckWheel()">🎲 帮我决定吃什么</button>
                    <p id="luck-result" class="memo" style="margin-top:15px;font-weight:bold"></p>
                </div>

                <div class="wish-box">
                    <p class="date-title">📝 我们的心愿清单</p>
                    <div id="wish-list"></div>
                </div>

                <div class="message-box">
                    <p class="date-title">💬 私密留言板</p>
                    <textarea class="message-input" id="message-input" placeholder="给对方留一句悄悄话..."></textarea>
                    <button class="btn" onclick="sendMessage()">发送留言</button>
                    <div id="message-list"></div>
                </div>

                <div class="game-box">
                    <p class="date-title">🎮 真心话大冒险</p>
                    <div class="wheel" id="gameWheel">
                        <div class="wheel-sector" style="transform:rotate(0deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                        <div class="wheel-sector" style="transform:rotate(45deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                        <div class="wheel-sector" style="transform:rotate(90deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                        <div class="wheel-sector" style="transform:rotate(135deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                        <div class="wheel-sector" style="transform:rotate(180deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                        <div class="wheel-sector" style="transform:rotate(225deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                        <div class="wheel-sector" style="transform:rotate(270deg);background:#ffb6c1"><div class="wheel-text">真心话</div></div>
                        <div class="wheel-sector" style="transform:rotate(315deg);background:#ffc0cb"><div class="wheel-text">大冒险</div></div>
                    </div>
                    <button class="btn" onclick="spinGameWheel()">🎲 开始转动</button>
                    <p id="game-result" class="memo" style="margin-top:15px;font-weight:bold"></p>
                </div>

                <div class="fun-box">
                    <p class="date-title">😊 每日心情打卡</p>
                    <div class="mood-buttons">
                        <button class="mood-btn" onclick="setMood('😊')" ${!canMood?"disabled":""}>😊</button>
                        <button class="mood-btn" onclick="setMood('😃')" ${!canMood?"disabled":""}>😃</button>
                        <button class="mood-btn" onclick="setMood('😢')" ${!canMood?"disabled":""}>😢</button>
                        <button class="mood-btn" onclick="setMood('😠')" ${!canMood?"disabled":""}>😠</button>
                        <button class="mood-btn" onclick="setMood('🥰')" ${!canMood?"disabled":""}>🥰</button>
                    </div>
                    <p class="memo" style="font-size:14px">每天只能打卡一次哦</p>
                </div>
            </div>`;

            const wishList = document.getElementById("wish-list");
            wishes.forEach((wish,index)=>{
                wishList.innerHTML += `
                <div class="wish-item">
                    <input type="checkbox" id="wish-${index}" ${wish.done?"checked":""} onchange="toggleWish(${index})">
                    <label for="wish-${index}">${wish.text}</label>
                </div>`;
            });
            const messageList = document.getElementById("message-list");
            messages.forEach(msg=>{
                messageList.innerHTML += `<div class="message-item"><p>${msg.text}</p><p class="message-time">${msg.time}</p></div>`;
            });
            const capsuleList = document.getElementById("capsule-list");
            capsules.forEach((capsule,index)=>{
                const openDate = new Date(capsule.openDate);
                const now = new Date();
                const canOpen = now >= openDate;
                const daysLeft = Math.ceil((openDate - now) / (1000*60*60*24));
                capsuleList.innerHTML += `
                <div class="capsule-item">
                    <div class="capsule-title">${capsule.title || "给未来的信"}</div>
                    <div class="capsule-time">封存时间：${capsule.createTime} | 打开时间：${capsule.openDate}</div>
                    ${canOpen ? `<button class="btn" onclick="openCapsule(${index})">📩 打开胶囊</button><div id="capsule-content-${index}" style="display:none;margin-top:10px" class="capsule-content"></div>` : `<p class="memo" style="margin-top:10px">⏳ 还有 ${daysLeft} 天才能打开</p>`}
                </div>`;
            });
            typeWriter(loveLetter, "loveLetter", 80);

            window.addMiss = function(){missCount++;localStorage.setItem("missCount",missCount);document.getElementById("miss-num").innerText = missCount;}
            window.refreshWord = function(){location.reload();}
            window.sayLove = function(){
                if(canLove){
                    loveDays++;lastLoveDate = today;
                    localStorage.setItem("loveDays",loveDays);localStorage.setItem("lastLoveDate",lastLoveDate);
                    alert("❤️ 我爱你！今天的爱意已收到～");location.reload();
                }
            }
            window.toggleWish = function(index){wishes[index].done = !wishes[index].done;localStorage.setItem("wishes",JSON.stringify(wishes));}
            window.spinLuckWheel = function(){
                const wheel = document.getElementById("luckWheel");
                const angle = Math.random()*360 + 1440;
                wheel.style.transition = "transform 4s ease-out";
                wheel.style.transform = `rotate(${angle}deg)`;
                setTimeout(()=>{
                    const result = luckOptions[Math.floor(Math.random()*luckOptions.length)];
                    document.getElementById("luck-result").innerText = "今天就吃：" + result;
                },4000);
            }
            window.spinGameWheel = function(){
                const wheel = document.getElementById("gameWheel");
                const angle = Math.random()*360 + 1440;
                wheel.style.transition = "transform 4s ease-out";
                wheel.style.transform = `rotate(${angle}deg)`;
                setTimeout(()=>{
                    const result = truthDare[Math.floor(Math.random()*truthDare.length)];
                    document.getElementById("game-result").innerText = result;
                },4000);
            }
            window.feedPet = function(){petHappiness = Math.min(100, petHappiness + 25);petExp += 10;checkLevelUp();showDogBubble("🍖 好好吃！谢谢姐姐/哥哥～");updatePetStatus();}
            window.playWithPet = function(){petHappiness = Math.min(100, petHappiness + 15);petExp += 8;checkLevelUp();showDogBubble("🎾 太好玩啦！再玩一次～");updatePetStatus();}
            window.sendMessage = function(){
                const text = document.getElementById("message-input").value.trim();
                if(!text) return;
                const now = new Date();
                const time = now.toLocaleString();
                messages.unshift({text, time});
                localStorage.setItem("messages", JSON.stringify(messages));
                alert("✅ 留言发送成功！");location.reload();
            }
            window.setMood = function(mood){
                if(canMood){
                    todayMood = mood;lastMoodDate = today;
                    localStorage.setItem("todayMood", todayMood);localStorage.setItem("lastMoodDate", lastMoodDate);
                    alert("✅ 心情打卡成功！");location.reload();
                }
            }
            window.createCapsule = function(){
                const content = document.getElementById("capsule-content").value.trim();
                const openDate = document.getElementById("capsule-date").value;
                if(!content || !openDate){alert("请填写信件内容和打开日期！");return;}
                const now = new Date();
                const createTime = now.toLocaleString();
                capsules.unshift({content,openDate,createTime,title:`写给 ${openDate} 的信`});
                localStorage.setItem("loveCapsules", JSON.stringify(capsules));
                alert("✅ 时间胶囊封存成功！到了那天就能打开啦～");location.reload();
            }
            window.openCapsule = function(index){
                const contentDiv = document.getElementById(`capsule-content-${index}`);
                contentDiv.style.display = contentDiv.style.display === "none" ? "block" : "none";
                contentDiv.innerText = capsules[index].content;
            }
            document.getElementById("period-date").onchange = (e)=>{
                lastPeriod = e.target.value;
                localStorage.setItem("lastPeriod",lastPeriod);
                alert("✅ 生理期已更新");location.reload();
            }
            initSuperPet();
        },3000);
    }else{
        alert("密码不对～只有黄帝大人才能进来哦");
    }
}
</script>
</body>
</html>
